<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article class="card">
        <img
          class="card__image"
          src="https://picsum.photos/seed/blog/400/220"
          alt="Blog preview"
        />

        <div class="card__body">
          <span class="card__category">Learning</span>
          <small class="card__date">Публікація  23 квітня 2026</small>
          <h2 class="card__title"><strong>Практична №3</strong></h2>
          <p class="card__description">
            Мета практичної роботи полягає в тому, щоб налаштувати середовище розробки VS Code, а також реалізувати картку блогу для вдосконалення фундаментальних навичок з HTML та CSS.
          </p>

          <div class="card__author">
            <img
              class="card__author-avatar"
              src=""
              alt="Greg Hooper"
            />
            <span class="card__author-name">Кравець Владислав</span>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
