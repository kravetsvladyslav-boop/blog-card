<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article class="card">
        <img
          class="card__image"
          src="https://picsum.photos/seed/blog/400/220"
          alt="Blog preview"
        />

        <div class="card__body">
          <span class="card__category">Learning</span>
          <small class="card__date">Published 21 Apr 2023</small>
          <h2 class="card__title">HTML &amp; CSS Foundations</h2>
          <p class="card__description">
            These languages are the backbone of every website. Mastering them
            opens the door to the entire world of front-end development.
          </p>

          <div class="card__author">
            <img
              class="card__author-avatar"
              src=""
              alt="Greg Hooper"
            />
            <span class="card__author-name">Greg Hooper</span>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
